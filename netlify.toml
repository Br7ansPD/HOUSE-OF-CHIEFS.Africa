[build]
  # Initialises dependencies and forges the Cloud Truth manifest during deployment
  command = "npm install && node forge-manifest.js"
  publish = "."
  functions = "netlify/functions"

[functions]
  # High-performance bundling for sovereign serverless functions
  node_bundler = "esbuild"

[[headers]]
  # Global security perimeter for all assets within the node
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"